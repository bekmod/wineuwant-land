<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <meta
      name="title"
      content="WineUWant | Discover & Experience Canadian VQA Wines"
    />
    <meta
      name="description"
      content="Discover exceptional Canadian VQA wines. WineUWant provides personalized wine recommendations, winery tours, tastings, and unforgettable experiences in the Niagara Region and BC."
    />
    <meta
      name="keywords"
      content="Canadian wine, VQA wine, wine recommendations, wine experiences, Niagara wine tours, BC wine, wine tasting, WineUWant, winery events"
    />
    <meta name="author" content="WineUWant" />
    <meta name="theme-color" content="#ffffff" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://wineuwant.com/" />
    <meta
      property="og:title"
      content="WineUWant | Discover & Experience Canadian VQA Wines"
    />
    <meta
      property="og:description"
      content="Discover exceptional Canadian VQA wines. WineUWant provides personalized wine recommendations, winery tours, tastings, and unforgettable experiences in the Niagara Region and BC."
    />
    <meta property="og:image" content="https://wineuwant.com/og-image.jpg" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://wineuwant.com/" />
    <meta
      property="twitter:title"
      content="WineUWant | Discover & Experience Canadian VQA Wines"
    />
    <meta
      property="twitter:description"
      content="Discover exceptional Canadian VQA wines. WineUWant provides personalized wine recommendations, winery tours, tastings, and unforgettable experiences in the Niagara Region and BC."
    />
    <meta
      property="twitter:image"
      content="https://wineuwant.com/og-image.jpg"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bentham&family=Luxurious+Script&family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <title>WineUWant</title>
    %sveltekit.head%
  </head>
  <body>
    <div id="svelte">%sveltekit.body%</div>
  </body>
</html>
